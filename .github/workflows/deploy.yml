name: Build & Deploy Doku

# Baut die Docusaurus-Site und lädt sie per FTP auf den All-Inkl-Server
# (docs.donamic.de). Läuft bei jedem Push auf main.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-docs
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Site bauen
        run: npm run build

      - name: FTP-Upload nach docs.donamic.de
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Inhalt des Build-Ordners hochladen ...
          local-dir: ./build/
          # ... in das Verzeichnis, auf das die Subdomain zeigt (im KAS anlegen).
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
